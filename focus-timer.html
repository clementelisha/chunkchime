<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Focus Timer</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0a0a0a;--surface:#1c1c1e;--surface2:#2c2c2e;--accent:#fff;--muted:#636366;--muted2:#3a3a3c;--orange:#ff9f0a;--green:#30d158;--red:#ff453a}
  body{background:var(--bg);color:var(--accent);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;max-width:430px;margin:0 auto;padding:0 20px 60px;overflow-x:hidden}
  h1{font-size:11px;font-weight:600;letter-spacing:1px;padding:18px 0 0;color:var(--muted);text-transform:uppercase}
  .task-section{width:100%;margin-top:24px}
  .task-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .task-header span{font-size:13px;color:var(--muted);font-weight:500}
  .add-btn{width:28px;height:28px;border-radius:50%;background:var(--orange);border:none;color:#000;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300;line-height:1}
  .tasks{display:flex;flex-direction:column;gap:2px;border-radius:14px;overflow:hidden;background:var(--surface)}
  .task{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:.5px solid var(--muted2)}
  .task:last-child{border-bottom:none}
  .task.active{background:rgba(255,159,10,.08)}
  .task-num{font-size:13px;color:var(--muted);min-width:16px;font-weight:500}
  .task-name{flex:1;font-size:16px;font-weight:400;background:none;border:none;color:var(--accent);outline:none;caret-color:var(--orange)}
  .task-name::placeholder{color:var(--muted)}
  .task-del{background:none;border:none;color:var(--muted2);font-size:20px;cursor:pointer;padding:2px 4px;line-height:1}
  .task-del:active{color:var(--red)}
  .task-indicator{width:8px;height:8px;border-radius:50%;background:var(--muted2);flex-shrink:0}
  .task.active .task-indicator{background:var(--orange)}
  .task.done .task-indicator{background:var(--green)}
  .audio-section{width:100%;margin-top:12px}
  .audio-row{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:14px;padding:13px 16px}
  .audio-label{font-size:15px;color:var(--muted);flex-shrink:0}
  .audio-name{flex:1;font-size:15px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .audio-pick{background:var(--surface2);border:none;color:var(--orange);font-size:13px;font-weight:500;padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .audio-clear{background:none;border:none;color:var(--muted2);font-size:20px;cursor:pointer;line-height:1;padding:0 4px;flex-shrink:0}
  .audio-clear:active{color:var(--red)}
  #audio-file{display:none}
  .vol-row{display:flex;align-items:center;gap:10px;padding:10px 16px 0}
  .vol-row span{font-size:12px;color:var(--muted);white-space:nowrap}
  input[type=range]{flex:1;accent-color:var(--orange)}
  .timer-section{width:100%;display:flex;flex-direction:column;align-items:center;margin-top:36px}
  .current-task-label{font-size:15px;color:var(--muted);min-height:20px;margin-bottom:6px;text-align:center}
  .progress-label{font-size:13px;color:var(--muted);margin-bottom:32px;min-height:16px}
  .timer-ring{position:relative;width:260px;height:260px;margin-bottom:40px}
  .ring-bg{position:absolute;inset:0}
  .time-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .time-text{font-size:72px;font-weight:200;letter-spacing:-3px;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
  .time-sub{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:.5px}
  .controls{display:flex;align-items:center;justify-content:center;gap:28px;width:100%}
  .ctrl-btn{display:flex;flex-direction:column;align-items:center;gap:8px;background:none;border:none;cursor:pointer}
  .ctrl-btn:active{opacity:.5}
  .ctrl-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .ctrl-label{font-size:11px;color:var(--muted);letter-spacing:.3px}
  .main-btn .ctrl-icon{background:var(--orange);width:76px;height:76px}
  .sec-btn .ctrl-icon{background:var(--surface)}
  .ring-track{fill:none;stroke:var(--surface2);stroke-width:4}
  .ring-fill{fill:none;stroke:var(--orange);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .5s linear;transform-origin:center;transform:rotate(-90deg) scaleX(-1) translate(-260px,0)}
</style>
</head>
<body>
<h1>Focus Timer</h1>

<div class="task-section">
  <div class="task-header">
    <span id="task-count">0 tasks</span>
    <button class="add-btn" id="add-task-btn">+</button>
  </div>
  <div class="tasks" id="task-list"></div>
</div>

<div class="audio-section">
  <div class="audio-row">
    <span class="audio-label" id="audio-label">Background</span>
    <span class="audio-name" id="audio-name"></span>
    <button class="audio-clear" id="audio-clear" style="display:none">×</button>
    <button class="audio-pick" id="audio-pick-btn">Choose file</button>
    <input type="file" id="audio-file" accept="audio/*">
  </div>
  <div class="vol-row" id="vol-row" style="display:none">
    <span>Volume</span>
    <input type="range" id="vol" min="0" max="100" value="60">
    <span id="vol-val">60%</span>
  </div>
</div>

<div class="timer-section">
  <div class="current-task-label" id="current-label">Add tasks to begin</div>
  <div class="progress-label" id="progress-label"></div>
  <div class="timer-ring">
    <svg class="ring-bg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-track" cx="130" cy="130" r="120"/>
      <circle class="ring-fill" id="ring" cx="130" cy="130" r="120"/>
    </svg>
    <div class="time-display">
      <div class="time-text" id="time-display">15:00</div>
      <div class="time-sub" id="time-sub">READY</div>
    </div>
  </div>
  <div class="controls">
    <button class="ctrl-btn sec-btn" id="restart-btn">
      <div class="ctrl-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      </div>
      <span class="ctrl-label">Restart</span>
    </button>
    <button class="ctrl-btn main-btn" id="main-btn">
      <div class="ctrl-icon" id="main-icon" style="display:flex;align-items:center;justify-content:center">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#000"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      <span class="ctrl-label" id="main-label">Start</span>
    </button>
    <button class="ctrl-btn sec-btn" id="skip-btn">
      <div class="ctrl-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </div>
      <span class="ctrl-label">Skip</span>
    </button>
  </div>
</div>

<script>
const DURATION=15*60, CIRCUM=2*Math.PI*120;
let tasks=[],current=0,remaining=DURATION,running=false,timer=null;
let bgAudio=null,bgURL=null,bgVolume=60;

const ring=document.getElementById('ring');
ring.style.strokeDasharray=CIRCUM;
ring.style.strokeDashoffset=0;

function save(){localStorage.setItem('ft_tasks',JSON.stringify(tasks));localStorage.setItem('ft_current',current);localStorage.setItem('ft_vol',bgVolume)}
function load(){try{const t=localStorage.getItem('ft_tasks'),c=localStorage.getItem('ft_current'),v=localStorage.getItem('ft_vol');if(t)tasks=JSON.parse(t);if(c)current=parseInt(c)||0;if(v)bgVolume=parseInt(v)||60;if(current>=tasks.length)current=0}catch(e){}}

function chime(isEnd){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const freqs=isEnd?[523.25,659.25,783.99,1046.5,1318.51]:[523.25,659.25,783.99,1046.5];
    freqs.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      const t=ctx.currentTime+i*.2;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.22,t+.06);
      g.gain.exponentialRampToValueAtTime(.001,t+.9);
      o.start(t);o.stop(t+1);
    });
  }catch(e){}
}

function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function setRing(p){ring.style.strokeDashoffset=CIRCUM*(1-p)}
function renderTime(){document.getElementById('time-display').textContent=fmt(remaining);setRing(remaining/DURATION)}
function startBg(){if(bgAudio)bgAudio.play().catch(()=>{})}
function pauseBg(){if(bgAudio)bgAudio.pause()}

function updateUI(){
  const hasTasks=tasks.length>0;
  const label=document.getElementById('current-label'),prog=document.getElementById('progress-label'),sub=document.getElementById('time-sub'),mainLabel=document.getElementById('main-label'),mainIcon=document.getElementById('main-icon');
  if(hasTasks&&current<tasks.length){label.textContent=tasks[current].name||`Task ${current+1}`;prog.textContent=`${current+1} of ${tasks.length}`}
  else{label.textContent=hasTasks?'All done!':'Add tasks to begin';prog.textContent=''}
  if(running){sub.textContent='RUNNING';mainIcon.innerHTML='<svg width="28" height="28" viewBox="0 0 24 24" fill="#000"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>';mainLabel.textContent='Pause'}
  else{sub.textContent=remaining===DURATION?'READY':'PAUSED';mainIcon.innerHTML='<svg width="28" height="28" viewBox="0 0 24 24" fill="#000"><polygon points="5,3 19,12 5,21"/></svg>';mainLabel.textContent=remaining===DURATION?'Start':'Resume'}
  renderTasks();
  document.getElementById('task-count').textContent=`${tasks.length} task${tasks.length!==1?'s':''}`;
}

function renderTasks(){
  const list=document.getElementById('task-list');list.innerHTML='';
  if(!tasks.length)return;
  tasks.forEach((t,i)=>{
    const div=document.createElement('div');
    div.className='task'+(i===current&&(running||remaining<DURATION)?' active':'')+(i<current?' done':'');
    const num=document.createElement('span');num.className='task-num';num.textContent=i+1;
    const dot=document.createElement('div');dot.className='task-indicator';
    const inp=document.createElement('input');inp.className='task-name';inp.placeholder='Task name…';inp.value=t.name;inp.dataset.i=i;
    inp.addEventListener('input',e=>{tasks[+e.target.dataset.i].name=e.target.value;save();updateUI()});
    const del=document.createElement('button');del.className='task-del';del.textContent='×';del.dataset.i=i;
    del.addEventListener('click',e=>{const idx=+e.currentTarget.dataset.i;tasks.splice(idx,1);if(current>=tasks.length)current=Math.max(0,tasks.length-1);save();reset();updateUI()});
    div.appendChild(num);div.appendChild(dot);div.appendChild(inp);div.appendChild(del);
    list.appendChild(div);
  });
}

function addTask(){tasks.push({name:''});save();updateUI();setTimeout(()=>{const ins=document.querySelectorAll('.task-name');if(ins.length)ins[ins.length-1].focus()},50)}

function advance(){
  clearInterval(timer);running=false;
  if(current<tasks.length-1){chime(false);current++;save();remaining=DURATION;renderTime();setTimeout(()=>{running=true;timer=setInterval(tick,1000);updateUI()},800)}
  else{chime(true);pauseBg();current=0;remaining=DURATION;save();renderTime();updateUI()}
}

function tick(){if(remaining<=0){advance();return}remaining--;renderTime()}

function reset(){clearInterval(timer);running=false;remaining=DURATION;pauseBg();renderTime();updateUI()}

function toggleTimer(){
  if(!tasks.length)return;
  if(running){clearInterval(timer);running=false;pauseBg()}
  else{running=true;timer=setInterval(tick,1000);startBg()}
  updateUI();
}

document.getElementById('main-btn').addEventListener('click',toggleTimer);
document.getElementById('skip-btn').addEventListener('click',()=>{if(tasks.length)advance()});
document.getElementById('restart-btn').addEventListener('click',()=>{clearInterval(timer);remaining=DURATION;if(running)timer=setInterval(tick,1000);renderTime();updateUI()});
document.getElementById('add-task-btn').addEventListener('click',addTask);

document.getElementById('audio-pick-btn').addEventListener('click',()=>document.getElementById('audio-file').click());
document.getElementById('audio-file').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  if(bgURL)URL.revokeObjectURL(bgURL);
  bgURL=URL.createObjectURL(file);
  if(bgAudio){bgAudio.pause();bgAudio=null}
  bgAudio=new Audio(bgURL);bgAudio.loop=true;bgAudio.volume=bgVolume/100;
  document.getElementById('audio-name').textContent=file.name.replace(/\.[^.]+$/,'');
  document.getElementById('audio-label').textContent='';
  document.getElementById('audio-clear').style.display='inline';
  document.getElementById('vol-row').style.display='flex';
  document.getElementById('audio-pick-btn').textContent='Change';
  if(running)bgAudio.play().catch(()=>{});
});
document.getElementById('audio-clear').addEventListener('click',()=>{
  if(bgAudio){bgAudio.pause();bgAudio=null}
  if(bgURL){URL.revokeObjectURL(bgURL);bgURL=null}
  document.getElementById('audio-name').textContent='';
  document.getElementById('audio-label').textContent='Background';
  document.getElementById('audio-clear').style.display='none';
  document.getElementById('vol-row').style.display='none';
  document.getElementById('audio-pick-btn').textContent='Choose file';
  document.getElementById('audio-file').value='';
});
document.getElementById('vol').addEventListener('input',function(){
  bgVolume=+this.value;document.getElementById('vol-val').textContent=bgVolume+'%';
  if(bgAudio)bgAudio.volume=bgVolume/100;save();
});

load();
if(!tasks.length)['Listening to the Words of Jesus','Bible Reading','Prayer','Lovable Build'].forEach(n=>tasks.push({name:n}));
save();
document.getElementById('vol').value=bgVolume;
document.getElementById('vol-val').textContent=bgVolume+'%';
renderTime();updateUI();
</script>
</body>
</html>
